name: Liste de lecture M3U à mise à jour automatique

on:
  schedule:
    - cron: '0 2 * * *' # S'exécute automatiquement toutes les nuits à 2h
  workflow_dispatch: # Permet de le lancer à la main

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installer les dépendances
        run: pip install requests

      - name: Exécuter le script de tri
        run: python script.py

      - name: Sauvegarder les modifications
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add playlist.m3u
          git diff --quiet && git diff --staged --quiet || git commit -m "Mise à jour automatique de la playlist"
          git push origin principal
